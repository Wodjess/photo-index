services:
  redis:
    image: redis:7-alpine
    container_name: photo-index-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  web:
    build: .
    container_name: photo-index-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-7860}:7860"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HF_HOME=/data/.cache
      - WEB_PORT=7860
      - RELOAD_POLL_S=5
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-4}
      - PHOTOINDEX_USER=${PHOTOINDEX_USER-admin}
      - PHOTOINDEX_PASS=${PHOTOINDEX_PASS-admin}
      - PHOTOINDEX_SESSION_SECURE=${PHOTOINDEX_SESSION_SECURE-0}
      - PHOTOINDEX_SESSION_TTL_DAYS=${PHOTOINDEX_SESSION_TTL_DAYS-7}
    volumes:
      - ./data:/data
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  worker:
    build: .
    container_name: photo-index-worker
    restart: unless-stopped
    command: python worker.py
    stop_grace_period: 120s
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HF_HOME=/data/.cache
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-4}
      - PHOTOINDEX_DATA=/data
    volumes:
      - ./data:/data
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python worker.py' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
